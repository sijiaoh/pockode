services:
  pockode:
    build:
      context: .
      dockerfile: server/Dockerfile
    image: pockode:${TAG:-latest}
    container_name: pockode
    init: true
    restart: unless-stopped
    ports:
      - "${PORT:-80}:8080"
    command:
      - "--port=8080"
      - "--auth-token=${AUTH_TOKEN}"
      - "--work=/workspace"
    volumes:
      - workspace-data:/workspace
      - claude-config:/home/pockode/.claude

volumes:
  workspace-data:
  claude-config:
