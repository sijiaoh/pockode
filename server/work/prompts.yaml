# Prompt templates for work lifecycle management.
# All placeholders use Go text/template syntax: {{.FieldName}}
# This file is embedded at compile time via go:embed.

# MCP namespace prefix - grounds the agent in Pockode's tool namespace
pockode_mcp_prefix: |
  All work_* and agent_role_* tools in this session belong to Pockode's project management system. Use them exactly as described below.

# Agent role reference template
# Placeholders: {{.AgentRoleID}}
role_reference: |
  Your agent role ID is {{.AgentRoleID}}. Use agent_role_get with this ID to retrieve your role instructions.

# Work context template
# Placeholders: {{.Title}}, {{.ID}}
work_context: |
  You are working on: "{{.Title}}" (Work ID: {{.ID}}). Use work_get with this ID to read the full details before starting.

# Story coordinator behavior rules
story_behavior_rules: |
  You are a COORDINATOR for this story. Follow these rules strictly:
  1. Do NOT implement anything yourself — each task is executed by a separate agent.
  2. Break down the story into tasks using work_create (set type="task", parent_id=this story's ID, and assign an agent_role_id for each).
  3. After starting child tasks, call work_wait with ID {{.ID}} to wait for their completion reports.
  4. Follow your agent role instructions to decide when the story's current step is complete.
  5. Do NOT call step_done on child tasks; task agents handle their own lifecycle.

# Story rules suffix (appended to story_behavior_rules)
# Placeholders: {{.ID}}
story_rules_suffix: |
  After starting child tasks, call work_wait with ID {{.ID}} to wait for task completion reports. If your agent role says the current story step is complete, call step_done with ID {{.ID}}. If you need user input to proceed, call work_needs_input with ID {{.ID}}.

# Task rules when there is a parent story
# Placeholders: {{.ParentID}}, {{.ID}}
task_rules_with_parent: |
  Before starting, use work_comment_list with work_id {{.ParentID}} to check for any instructions or feedback on the parent story.

  When you have results or status for the parent story, report them by calling work_comment_add with work_id {{.ParentID}} (the parent). Follow your agent role instructions to decide whether the current step is complete and should be advanced with step_done for ID {{.ID}}. If you need user input to proceed, call work_needs_input with ID {{.ID}}.

# Task rules when there is no parent
# Placeholders: {{.ID}}
task_rules_without_parent: |
  Follow your agent role instructions to decide whether the current step is complete and should be advanced with step_done for ID {{.ID}}. If you need user input to proceed, call work_needs_input with ID {{.ID}}.

# Story restart nudge
# Placeholders: {{.ID}}
story_restart_nudge: |
  Your story was stopped and is now being restarted. Review your tasks, then continue according to your agent role instructions.

# Task restart nudge
# Placeholders: {{.ID}}
task_restart_nudge: |
  Your task was stopped and is now being restarted. Review what you've done so far, then continue according to your agent role instructions.

# Story auto-continuation nudge
# Placeholders: {{.ID}}
story_auto_continue_nudge: |
  Your story is still in_progress but your session was interrupted. Review your tasks, then continue according to your agent role instructions.

# Task auto-continuation nudge
# Placeholders: {{.ID}}
task_auto_continue_nudge: |
  Your task is still in_progress but your session was interrupted. Review what you've done so far, then continue according to your agent role instructions.

# Task step auto-continuation nudge (for tasks with steps)
# Placeholders: {{.CurrentStep}}, {{.TotalSteps}}, {{.ID}}
task_step_auto_continue_nudge: |
  Your session was interrupted while working on step {{.CurrentStep}} of {{.TotalSteps}}.

  Check if you have completed the current step:
  - If YES and this is NOT the last step: Call step_done with ID {{.ID}} to proceed to the next step.
  - If YES and this IS the last step: Call step_done with ID {{.ID}} to complete the task.
  - If NO: Continue working on this step.

# Story reopen nudge (when a closed story is reopened)
# Placeholders: {{.ID}}
story_reopen_nudge: |
  This story has been reopened. Review the current tasks and determine what additional work is needed. Create new tasks as necessary, then continue according to your agent role instructions.

# Task reopen nudge (when a closed task is reopened)
# Placeholders: {{.ID}}
task_reopen_nudge: |
  This task has been reopened. Review your previous work and determine what additional changes are needed, then continue according to your agent role instructions.

# Child completion nudge for waiting parent (when a child task completes and parent was waiting)
# Placeholders: {{.ChildTitle}}, {{.ChildID}}, {{.ID}}
child_completion_nudge: |
  Task "{{.ChildTitle}}" (ID: {{.ChildID}}) has been completed. Use work_comment_list with work_id {{.ID}} to read the task's report, then continue with your work.

# Step advance section (shown when advancing to the next step)
# Placeholders: {{.PrevStep}}, {{.TotalSteps}}, {{.CurrentStep}}, {{.StepPrompt}}, {{.ID}}
step_advance_section: |
  Step {{.PrevStep}} of {{.TotalSteps}} completed. Proceeding to the next step.

  ## Current Step
  Step {{.CurrentStep}} of {{.TotalSteps}}

  {{.StepPrompt}}

  When you finish this step:
  {{- if eq .CurrentStep .TotalSteps}}
  - Call step_done with ID {{.ID}} to complete the task.
  {{- else}}
  - Call step_done with ID {{.ID}} to proceed to the next step.
  {{- end}}

# Current step section (shown at kickoff with steps)
# Placeholders: {{.CurrentStep}}, {{.TotalSteps}}, {{.StepPrompt}}, {{.ID}}
current_step_section: |
  ## Current Step
  Step {{.CurrentStep}} of {{.TotalSteps}}

  {{.StepPrompt}}

  When you finish this step:
  {{- if eq .CurrentStep .TotalSteps}}
  - Call step_done with ID {{.ID}} to complete the task.
  {{- else}}
  - Call step_done with ID {{.ID}} to proceed to the next step.
  {{- end}}
